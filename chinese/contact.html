      <main class="subpage-main">
        <section class="contact-panel">
          <h1>联系</h1>
          <p>
            如有问题、意见或咨询，请使用下方表单。
            媒体和内容创作者请在首次联系时说明具体需求。
            这有助于我们更好地整理咨询内容，并确保合适的人看到你的消息。
            如有问题、意见或咨询，请使用下方表单。
          </p>

          <div class="form-wrap">
            <form
              id="contactForm"
              class="contact-form-simple"
              name="contact"
              method="POST"
              data-netlify="true"
              netlify-honeypot="empty-field"
            >
              <input type="hidden" name="form-name" value="contact" />

              <div style="display:none;">
                <input name="empty-field" />
              </div>

              <div class="field">
                <label>姓名</label>
                <input name="name" required />
              </div>

              <div class="field">
                <label>邮箱</label>
                <input name="email" type="email" required />
              </div>

              <div class="field">
                <label>主题</label>
                <input name="subject" />
              </div>

              <div class="field">
                <label>留言</label>
                <textarea name="message" required></textarea>
              </div>

              <button class="button" id="submitBtn" type="submit">
                <span class="btn-text">发送消息</span>
              </button>
              <div id="formError" class="form-error" aria-live="polite"></div>
            </form>

            <div id="successState" class="success-state contact" aria-live="polite">
              <div class="success-icon">
                <dotlottie-player
                  id="contactSuccessAnim"
                  src="/images/Check Mark - Success.lottie"
                  background="transparent"
                  speed="1"
                ></dotlottie-player>
              </div>
              <p class="m-0">已发送。</p>
            </div>
          </div>
        </section>
      </main>

            岛屿游戏工作室是一家小型独立游戏工作室，热衷于打造能带来快乐的作品。

            <a href="#">

            <a href="about.html">关于我们</a>
            <a href="press.html">媒体</a>
            <a href="creators.html">内容创作者</a>

          </div>
        </div>

    </div>

    <script>
      const langToggle = document.querySelector('.lang-toggle');
      const langMenu = document.querySelector('.lang-menu');

      if (langToggle && langMenu) {
        const currentLang = langToggle.dataset.lang;

        langMenu.querySelectorAll('a[data-lang]').forEach(a => {
          if (a.dataset.lang === currentLang) {
            a.parentElement.style.display = 'none';
          }
        });

        langToggle.addEventListener('click', function (e) {
          e.stopPropagation();
          langMenu.classList.toggle('is-open');
        });

        document.addEventListener('click', function () {
          langMenu.classList.remove('is-open');
        });
      }

      const _ = e => document.querySelector(e), __ = e => document.querySelectorAll(e);
      _('.menu-toggler').addEventListener('click', () => document.body.classList.toggle('menu-open'));
    </script>

    <script>
      function encode(data) {
        return Object.keys(data)
          .map(
            (key) =>
              encodeURIComponent(key) + "=" + encodeURIComponent(data[key])
          )
          .join("&");
      }

      function wireAjaxForm(formId, submitBtnId, successStateId, errorId, sendingText, defaultText) {
        const form = document.getElementById(formId);
        if (!form) return;

        const submitBtn = document.getElementById(submitBtnId);
        const btnText = submitBtn ? submitBtn.querySelector(".btn-text") : null;
        const successState = document.getElementById(successStateId);
        const formError = document.getElementById(errorId);

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          if (formError) {
            formError.textContent = "";
            formError.classList.remove("is-visible");
          }

          if (submitBtn) submitBtn.disabled = true;
          if (btnText) btnText.textContent = sendingText || "发送中...";

          try {
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
              data[key] = value;
            });

            const formName = form.getAttribute("name");
            if (formName && !data["form-name"]) {
              data["form-name"] = formName;
            }

            await fetch(form.getAttribute("action") || "/", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: encode(data),
            });

            form.reset();
            form.classList.add("is-hidden");
            if (successState) successState.classList.add("is-visible");

            const anim = successState.querySelector("dotlottie-player");

            requestAnimationFrame(() => {
              if (anim) {
                anim.stop();
                anim.seek(0);
                anim.play();
              }
            });
          } catch (error) {
            console.error(error);

            if (submitBtn) submitBtn.disabled = false;
            if (btnText) btnText.textContent = defaultText || "发送消息";

            if (formError) {
              formError.textContent = "出错了，请重试。";
              formError.classList.add("is-visible");
            }
          }
        });
      }

      wireAjaxForm("contactForm", "submitBtn", "successState", "formError", "发送中...", "发送消息");
      wireAjaxForm("signup-form", "signupSubmitBtn", "signupSuccessState", "signupFormError", "发送中...", "注册");
    </script>
  </body>
</html>
